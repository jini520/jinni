# 공통 설정 (모든 프로파일에 적용)
spring.application.name=server

# Jasypt 암호화 설정 (공통)
# 암호화 키는 환경 변수 JASYPT_ENCRYPTOR_PASSWORD에서 읽어옵니다
# Ubuntu 서버에서 systemd 서비스 파일을 통해 설정:
#   - /etc/systemd/system/jejinni-backend.service에 EnvironmentFile=/etc/jejinni/secrets/jasypt.env 추가
#   - /etc/jejinni/secrets/jasypt.env 파일에 JASYPT_ENCRYPTOR_PASSWORD=your-secret-key 저장
#   - 파일 권한: 600, 소유자: app-user
# 주의: 프로파일은 런타임에 설정하세요 (예: --spring.profiles.active=prod)
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD:}
jasypt.encryptor.algorithm=PBEWithMD5AndDES
